<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panaudia MOQ Client - Basic Test</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      color: #00d4ff;
    }
    .section {
      background: #16213e;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0f0f23;
      color: #eee;
      font-family: monospace;
    }
    textarea {
      height: 80px;
      resize: vertical;
    }
    button {
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover {
      background: #00b8e6;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    button.danger {
      background: #ff4757;
    }
    button.danger:hover {
      background: #ff3344;
    }
    .status {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-weight: 600;
    }
    .status.disconnected { background: #555; }
    .status.connecting { background: #f39c12; color: #1a1a2e; }
    .status.connected { background: #00b894; color: #1a1a2e; }
    .status.authenticated { background: #00d4ff; color: #1a1a2e; }
    .status.error { background: #ff4757; }
    #log {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .log-info { color: #00d4ff; }
    .log-success { color: #00b894; }
    .log-error { color: #ff4757; }
    .log-warn { color: #f39c12; }
    .support-table {
      width: 100%;
      border-collapse: collapse;
    }
    .support-table td {
      padding: 8px;
      border-bottom: 1px solid #333;
    }
    .support-table td:first-child {
      font-weight: 600;
    }
    .check { color: #00b894; }
    .cross { color: #ff4757; }
  </style>
</head>
<body>
  <h1>Panaudia MOQ Client Test</h1>

  <!-- Browser Support Check -->
  <div class="section">
    <h2>Browser Support</h2>
    <table class="support-table" id="supportTable">
      <tr>
        <td>WebTransport</td>
        <td id="wtSupport">Checking...</td>
      </tr>
      <tr>
        <td>Web Audio API</td>
        <td id="audioSupport">Checking...</td>
      </tr>
      <tr>
        <td>getUserMedia</td>
        <td id="mediaSupport">Checking...</td>
      </tr>
    </table>
  </div>

  <!-- Connection Status -->
  <div class="section">
    <h2>Connection</h2>
    <div id="connectionStatus" class="status disconnected">
      Status: Disconnected
    </div>

    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://localhost:4433" value="https://localhost:4433">

    <label for="jwtToken">JWT Token</label>
    <textarea id="jwtToken" placeholder="Paste your JWT token here..."></textarea>

    <button id="connectBtn" onclick="connect()">Connect</button>
    <button id="disconnectBtn" onclick="disconnect()" class="danger" disabled>Disconnect</button>
  </div>

  <!-- Node Info (after connection) -->
  <div class="section" id="nodeInfoSection" style="display: none;">
    <h2>Node Info</h2>
    <table class="support-table">
      <tr>
        <td>Node ID</td>
        <td id="nodeId">-</td>
      </tr>
      <tr>
        <td>Audio Input Track</td>
        <td id="audioInputTrack">-</td>
      </tr>
      <tr>
        <td>Audio Output Track</td>
        <td id="audioOutputTrack">-</td>
      </tr>
      <tr>
        <td>State Track</td>
        <td id="stateTrack">-</td>
      </tr>
    </table>
  </div>

  <!-- Log -->
  <div class="section">
    <h2>Log</h2>
    <div id="log"></div>
    <button onclick="clearLog()">Clear Log</button>
  </div>

  <!-- Load the library -->
  <script type="module">
    // Import from the built library
    import {
      PanaudiaMoqClient,
      isWebTransportSupported,
      getWebTransportSupport,
      generateTrackNamespace,
      PanaudiaTrackType,
      ConnectionState,
    } from './js/panaudia-moq-client.js';

    // Make available globally for button handlers
    window.PanaudiaMoqClient = PanaudiaMoqClient;
    window.isWebTransportSupported = isWebTransportSupported;
    window.getWebTransportSupport = getWebTransportSupport;
    window.generateTrackNamespace = generateTrackNamespace;
    window.PanaudiaTrackType = PanaudiaTrackType;
    window.ConnectionState = ConnectionState;

    // Current client instance
    window.client = null;

    // Check browser support
    function checkSupport() {
      // WebTransport
      const wtSupport = isWebTransportSupported();
      document.getElementById('wtSupport').innerHTML = wtSupport
        ? '<span class="check">✓ Supported</span>'
        : '<span class="cross">✗ Not Supported</span>';

      // Web Audio
      const audioSupport = typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined';
      document.getElementById('audioSupport').innerHTML = audioSupport
        ? '<span class="check">✓ Supported</span>'
        : '<span class="cross">✗ Not Supported</span>';

      // getUserMedia
      const mediaSupport = navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
      document.getElementById('mediaSupport').innerHTML = mediaSupport
        ? '<span class="check">✓ Supported</span>'
        : '<span class="cross">✗ Not Supported</span>';

      if (!wtSupport) {
        log('WebTransport is not supported in this browser. Try Chrome 97+.', 'error');
        document.getElementById('connectBtn').disabled = true;
      }
    }

    // Logging
    window.log = function(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toISOString().substr(11, 12);
      const line = document.createElement('div');
      line.className = `log-${type}`;
      line.textContent = `[${timestamp}] ${message}`;
      logDiv.appendChild(line);
      logDiv.scrollTop = logDiv.scrollHeight;
    };

    window.clearLog = function() {
      document.getElementById('log').innerHTML = '';
    };

    // Update connection status
    window.updateStatus = function(state) {
      const statusDiv = document.getElementById('connectionStatus');
      statusDiv.className = `status ${state}`;
      statusDiv.textContent = `Status: ${state.charAt(0).toUpperCase() + state.slice(1)}`;

      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');

      if (state === 'disconnected' || state === 'error') {
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
      } else {
        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
      }
    };

    // Connect to server
    window.connect = async function() {
      const serverUrl = document.getElementById('serverUrl').value.trim();
      const jwtToken = document.getElementById('jwtToken').value.trim();

      if (!serverUrl) {
        log('Please enter a server URL', 'error');
        return;
      }

      if (!jwtToken) {
        log('Please enter a JWT token', 'error');
        return;
      }

      log(`Connecting to ${serverUrl}...`);
      updateStatus('connecting');

      try {
        // Create client
        window.client = new PanaudiaMoqClient({
          serverUrl: serverUrl,
          ticket: jwtToken,
        });

        // Set up event handlers
        client.on('statechange', (event) => {
          log(`State changed: ${event.previousState} -> ${event.currentState}`);
          updateStatus(event.currentState);
        });

        client.on('authenticated', () => {
          log('Successfully authenticated!', 'success');
          showNodeInfo();
        });

        client.on('connected', () => {
          log('Connected and ready!', 'success');
        });

        client.on('disconnected', () => {
          log('Disconnected from server');
          hideNodeInfo();
        });

        client.on('error', (event) => {
          log(`Error: ${event.message} (${event.code})`, 'error');
        });

        // Connect
        await client.connect();

      } catch (error) {
        log(`Connection failed: ${error.message}`, 'error');
        updateStatus('error');
        window.client = null;
      }
    };

    // Disconnect from server
    window.disconnect = async function() {
      if (window.client) {
        log('Disconnecting...');
        await window.client.disconnect();
        window.client = null;
      }
    };

    // Show node info after connection
    window.showNodeInfo = function() {
      if (!window.client) return;

      const nodeId = window.client.getNodeId();
      document.getElementById('nodeId').textContent = nodeId;

      const audioInput = generateTrackNamespace(PanaudiaTrackType.AUDIO_INPUT, nodeId);
      const audioOutput = generateTrackNamespace(PanaudiaTrackType.AUDIO_OUTPUT, nodeId);
      const state = generateTrackNamespace(PanaudiaTrackType.STATE, nodeId);

      document.getElementById('audioInputTrack').textContent = '/' + audioInput.join('/');
      document.getElementById('audioOutputTrack').textContent = '/' + audioOutput.join('/');
      document.getElementById('stateTrack').textContent = '/' + state.join('/');

      document.getElementById('nodeInfoSection').style.display = 'block';
    };

    window.hideNodeInfo = function() {
      document.getElementById('nodeInfoSection').style.display = 'none';
    };

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkSupport();
      log('Panaudia MOQ Client Test Page loaded');
      log('Enter server URL and JWT token to connect');
    });
  </script>
</body>
</html>
